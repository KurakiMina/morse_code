<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>モールス信号練習</title>
  <link rel="stylesheet" href="./styles.css">
  <script src="./app.js" defer></script>
</head>
<body>
  <main class="app">
    <header class="header">
      <h1>モールス信号練習</h1>
      <p>参考画像に寄せたボード型です。●が短押し、■が長押し。通過した丸や四角は塗りつぶされ、数字も追加済みです。</p>
    </header>

    <section class="panel status-panel" aria-label="入力状況">
      <div class="status-grid">
        <div class="status-card">
          <span class="label">現在の入力</span>
          <strong id="currentCode" class="code-display">未入力</strong>
        </div>
        <div class="status-card">
          <span class="label">判定文字</span>
          <strong id="currentLetter" class="letter-display">-</strong>
        </div>
        <div class="status-card">
          <span class="label">確定済み</span>
          <strong id="outputText" class="output-display">-</strong>
        </div>
      </div>

      <div class="time-meter-wrap">
        <div class="time-meter-labels">
          <span>● 短押し</span>
          <span>■ 長押し</span>
        </div>
        <div class="time-meter">
          <div id="timeBar" class="time-bar"></div>
          <div class="threshold-line" aria-hidden="true"></div>
        </div>
      </div>
    </section>

    <section class="panel legend-panel" aria-label="記号説明">
      <div class="legend-item">
        <span class="shape-swatch dot" aria-hidden="true"></span>
        <span>短押し</span>
      </div>
      <div class="legend-item">
        <span class="shape-swatch dash" aria-hidden="true"></span>
        <span>長押し</span>
      </div>
      <div class="legend-item">
        <span class="legend-chip path"></span>
        <span>通過済み</span>
      </div>
      <div class="legend-item">
        <span class="legend-chip current"></span>
        <span>現在位置</span>
      </div>
      <div class="legend-item">
        <span class="legend-chip final"></span>
        <span>確定位置</span>
      </div>
    </section>

    <section class="panel board-panel" aria-label="モールス信号ボード">
      <div class="board-wrap">
        <svg id="morseBoard" class="morse-board" viewBox="0 0 960 980" role="img" aria-label="モールス信号ボード"></svg>
      </div>
    </section>

    <section class="panel control-panel" aria-label="操作">
      <button id="keyButton" class="key-button" type="button">押す</button>
      <div class="button-row">
        <button id="spaceButton" class="secondary-button" type="button">スペース</button>
        <button id="deleteButton" class="secondary-button" type="button">1つ戻る</button>
        <button id="resetButton" class="secondary-button danger" type="button">リセット</button>
      </div>
      <p class="hint">スマホではボード全体が画面幅に収まるよう縮小表示されます。数字は下段の一覧に追加してあります。未対応コードは ? で確定します。</p>
    </section>
  </main>
</body>
</html>
